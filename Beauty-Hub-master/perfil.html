<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil | Beauty Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/perfil.css">
</head>
<body>

<div class="sidebar">
  <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
  <h2>Beauty Hub</h2>
  <ul>
    <li><a href="cliente_home.html"><i class="fa-solid fa-house"></i><span> Início</span></a></li>
    <li><a href="agendar.html"><i class="fa-solid fa-clock"></i><span> Agende Seu Horarios</span></a></li>
    <li><a href="meus_agendamentos.html"><i class="fa-solid fa-calendar-days"></i><span> Meus Agendamentos</span></a></li>
    <li><a href="perfil.html" class="active"><i class="fa-solid fa-user"></i><span> Perfil</span></a></li>
    <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span> Sair</span></a></li>
  </ul>
</div>

<div class="main">
  <div class="topbar">
    <div class="brand"><i class="fa-solid fa-sparkles"></i> Beauty Hub</div>
    <div class="topbar-right">
      <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
      <button class="icon-btn"><i class="fa-regular fa-envelope"></i></button>
      <div class="user-avatar"></div>
    </div>
  </div>

  <main>
    <div class="profile-card">
      <h1>Meu Perfil</h1>
      <p class="lead">Confira seus dados e mantenha tudo atualizado</p>

      <div class="inspirational-card">
        "A verdadeira beleza vem da confiança e do cuidado que dedicamos a nós mesmos. 🌸"
      </div>

      <div class="info-group">
        <label>🧑 Nome:</label>
        <input type="text" id="profileName" disabled>
      </div>
      <div class="info-group">
        <label>📧 Email:</label>
        <input type="email" id="profileEmail" disabled>
      </div>
      <div class="info-group">
        <label>📞 Telefone:</label>
        <input type="text" id="profilePhone" disabled>
      </div>
      <div class="info-group">
        <label>🏠 Endereço (opcional):</label>
        <input type="text" id="profileAddress" disabled>
      </div>
      <div class="info-group">
        <label>🎂 Data de Nascimento (opcional):</label>
        <input type="date" id="profileBirth" disabled>
      </div>

      <div class="edit-save-btns">
        <button class="editBtn" id="editBtn">Editar</button>
        <button class="saveBtn" id="saveBtn" style="display:none;">Salvar</button>
      </div>
    </div>
  </main>

  <footer>© 2025 Beauty Hub - Todos os direitos reservados.</footer>
</div>

<script src="js/perfil.js"></script>

</body>
</html>
