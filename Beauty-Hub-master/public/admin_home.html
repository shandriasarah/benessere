<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Administrativo | Beauty Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/admin_home.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
  <h2>Beauty Hub</h2>
  <ul>
    <li><a href="admin_home.html" class="active"><i class="fa-solid fa-house"></i><span> Início</span></a></li>
    <li><a href="agenda.html"><i class="fa-solid fa-clock"></i><span>Agendamentos</span></a></li>
    <li><a href="cliente.html"><i class="fa-solid fa-users"></i><span>Clientes</span></a></li>
    <li><a href="pdv.html"><i class="fa-solid fa-cash-register"></i><span>PDV</span></a></li>
    <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></a></li>
  </ul>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h1>Beauty Hub</h1>
    <div class="topbar-right">
      <button class="icon-btn" title="Notificações"><i class="fa-regular fa-bell"></i></button>
      <button class="icon-btn" title="Mensagens"><i class="fa-regular fa-envelope"></i></button>
      <div class="user-avatar" title="Perfil"></div>
    </div>
  </div>

  <div class="content">
    <div class="page-head">
      <h1>Painel administrativo:</h1>
      <div class="controls">
        <button class="ghost" id="btnRefresh">🔁 Atualizar</button>
        <button class="primary" id="btnNewBooking">➕ Novo agendamento</button>
      </div>
    </div>

    <!-- Cards -->
    <div class="dashboard-grid" id="cardsWrap">
      <div class="card"><i class="fa-solid fa-user-group"></i><h3>Clientes ativos:</h3><p id="cardClients">—</p></div>
      <div class="card"><i class="fa-solid fa-calendar-check"></i><h3>Agendamentos Hoje:</h3><p id="cardToday">—</p></div>
      <div class="card"><i class="fa-solid fa-coins"></i><h3>Faturamento (Mês):</h3><p id="cardRevenue">R$ —</p></div>
    </div>

    <!-- Chart + Recent -->
    <div class="mid">
      <div class="chart-panel">
        <h3 style="margin:0 0 12px 0;color:var(--purple-700)">Faturamento Mensal:</h3>
        <canvas id="revenueChart" style="max-height:300px"></canvas>
      </div>

     <div class="recent-panel">
      <h3 style="margin-bottom:12px;color:var(--purple-700)">Atalhos</h3>
      <div style="display:flex;flex-direction:column;gap:20px;margin-top:12px">
        <a href="cliente.html" class="shortcut-card"><span>Ver clientes</span></a>
        <a href="agenda.html" class="shortcut-card"><span>Ver agenda</span></a>
        <a href="pdv.html" class="shortcut-card"><span>Abrir PDV</span></a>
      </div>
    </div>
  </div>
</div>
</div>

<script src="js/admin_home.js"></script>
  <footer>© 2025 Beauty Hub - Todos os direitos reservados.</footer>
</body>
</html>
