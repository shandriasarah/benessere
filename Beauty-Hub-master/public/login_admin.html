<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Admin | Benessere</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/login_admin.css">
</head>
<body>

<div class="topbar">
  <div class="brand"><i class="fa-solid fa-sparkles"></i> Benessere</div>
  <div class="topbar-right">
    <div class="user-avatar"></div>
  </div>
</div>

<main>
  <div class="side-text">
  <img src="img/logo_beautyhub.jpeg" alt="Beleza e confiança" />
</div>


  <div class="form-container">
    <a href="index.html" class="back-button">
      <i class="fa-solid fa-arrow-left"></i>
    </a>

    <h1>Login do Admin</h1>
    <form onsubmit="return loginAdmin(event)">
      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input id="adminUser" type="text" required placeholder="Digite o usuário">
      </div>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input id="adminSenha" type="password" required placeholder="Digite sua senha">
      </div>
      <button class="btn" type="submit">Entrar</button>
      <p id="msgAdmin"></p>
    </form>
  </div>
</main>

  <footer>© 2025 Benessere - Todos os direitos reservados.</footer>

<script src="js/login_admin.js"></script>

</body>
</html>
