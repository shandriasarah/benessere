<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Meus Agendamentos | Beauty Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/meus_agendamentos.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
  <h2>Beauty Hub</h2>
  <ul>
    <li><a href="cliente_home.html"><i class="fa-solid fa-house"></i><span> Início</span></a></li>
     <li><a href="agendar.html"><i class="fa-solid fa-clock"></i><span> Agende Seu Horarios</span></a></li>
    <li><a href="meus_agendamentos.html" class="active"><i class="fa-solid fa-calendar-days"></i><span> Meus Agendamentos</span></a></li>
    <li><a href="perfil.html"><i class="fa-solid fa-user"></i><span> Perfil</span></a></li>
    <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span> Sair</span></a></li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="brand"><i class="fa-solid fa-sparkles"></i> Beauty Hub</div>
    <div class="topbar-right">
      <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
      <button class="icon-btn"><i class="fa-regular fa-envelope"></i></button>
      <div class="user-avatar"></div>
    </div>
  </div>

  <main>
    <h1>Meus Agendamentos</h1>
    <p class="lead">Confira, filtre, edite ou cancele seus agendamentos.</p>

    <div class="controls">
      <div class="search" title="Pesquisar por nome do profissional ou serviço">
        🔍 <input id="searchInput" placeholder="Pesquisar (profissional, serviço ou data dd/mm/aaaa)" />
      </div>

      <div class="filter">
        <select id="filterStatus" title="Filtrar por status">
          <option value="all">Todos</option>
          <option value="Agendado">Agendado</option>
          <option value="Concluído">Concluído</option>
          <option value="Cancelado">Cancelado</option>
        </select>
        <button class="small" id="clearFilters">Limpar</button>
      </div>
    </div>

    <div class="card">
      <table aria-label="Meus Agendamentos">
        <thead>
          <tr>
            <th>Data</th>
            <th>Hora</th>
            <th>Profissional</th>
            <th>Serviço</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="agendamentosBody"></tbody>
      </table>

      <div id="emptyMsg" class="empty" style="display:none">Você não possui agendamentos.</div>
    </div>
  </main>

  <footer>© 2025 Beauty Hub - Todos os direitos reservados.</footer>
</div>

<script src="js/meus_agendamentos.js"></script>
</body>
</html>
