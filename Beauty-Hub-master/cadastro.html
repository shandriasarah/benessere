<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro Cliente | Beauty Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/cadastro.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="brand"><i class="fa-solid fa-sparkles"></i> Beauty Hub</div>
      <div class="topbar-right">
        <div class="user-avatar"></div>
      </div>
    </div>

    <main>
      <a href="login_cliente.html" class="back-button">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <h1>Cadastro de Cliente</h1>
      <p class="subtitle">
        Crie sua conta para agendar serviços e acompanhar sua beleza.
      </p>

      <form onsubmit="cadastrarCliente(event)">
        <div class="input-group">
          <i class="fa-solid fa-user"></i>
          <input
            id="cadNome"
            type="text"
            placeholder="Digite seu nome"
            required
          />
        </div>

        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input
            id="cadEmail"
            type="email"
            placeholder="Digite seu email"
            required
          />
        </div>

        <div class="input-group">
          <i class="fa-solid fa-phone"></i>
          <input
            id="cadTelefone"
            type="tel"
            placeholder="Digite seu telefone (opcional)"
          />
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input
            id="cadSenha"
            type="password"
            placeholder="Crie uma senha"
            required
          />
        </div>

        <button class="btn" type="submit">Criar Conta</button>
        <p id="msgCliente"></p>
      </form>

      <p class="create-msg">Já possui conta?</p>
      <a href="login_cliente.html" class="create-account">Faça login</a>
    </main>

    <footer>© 2025 Beauty Hub - Todos os direitos reservados.</footer>

    <script>
      async function cadastrarCliente(event) {
        event.preventDefault();
        console.log("Botão clicado!"); // Isso vai nos mostrar se a função foi chamada

        const nome = document.getElementById("cadNome").value;
        const email = document.getElementById("cadEmail").value;
        const senha = document.getElementById("cadSenha").value;
        const msgElemento = document.getElementById("msgCliente");

        try {
          const response = await fetch(
            "https://beauty-hub-72cv.onrender.com/api/auth/register",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: nome,
                email: email,
                password: senha,
              }),
            },
          );

          const data = await response.json();

          if (response.ok) {
            alert("✅ Conta criada com sucesso!");
            window.location.href = "login_cliente.html";
          } else {
            msgElemento.innerText = "❌ " + (data.message || "Erro");
            msgElemento.style.color = "red";
          }
        } catch (error) {
          console.error("Erro:", error);
          alert("Erro ao conectar!");
        }
      }
    </script>
  </body>
</html>
