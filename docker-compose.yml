services:
  db:
    image: mysql:8.0
    container_name: beauty_hub_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: beauty_hub
    ports:
      - "3306:3306"

  app:
    build:
      context: ./Beauty-Hub-master/backend
      dockerfile: Dockerfile
    container_name: beauty_hub_app
    ports:
      - "3000:3000"
    restart: on-failure
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=beauty_hub
