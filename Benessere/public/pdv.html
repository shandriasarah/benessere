<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDV | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/pdv.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
      <h2>Benessere</h2>
      <ul>
        <li><a href="admin_home.html"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a></li>
        <li><a href="agenda.html"><i class="fa-solid fa-calendar-days"></i><span>Agendamentos</span></a></li>
        <li><a href="cliente.html"><i class="fa-solid fa-users"></i><span>Clientes</span></a></li>
        <li><a href="pdv.html" class="active"><i class="fa-solid fa-cash-register"></i><span>PDV</span></a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></a></li>
      </ul>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="brand">
          <span class="brand-icon"></span>
          Benessere
        </div>
        <div class="user-section">
          <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
          <button class="icon-btn"><i class="fa-regular fa-envelope"></i></button>
          <div class="user-avatar"></div>
        </div>
      </div>

      <div class="content">
        <div class="page-head">
          <span class="eyebrow">Ponto de Venda</span>
          <h1>PDV</h1>
        </div>

        <div class="pdv-layout">
          <!-- PDV Form -->
          <div class="panel">
            <h3 class="panel-title"><i class="fa-solid fa-cash-register"></i> Registrar Pagamento</h3>

            <div class="pdv-field">
              <label for="cliente">Cliente</label>
              <input type="text" id="cliente" placeholder="Nome do cliente" />
            </div>

            <div class="pdv-field">
              <label for="servico">Serviço</label>
              <select id="servico">
                <option value="">Carregando serviços...</option>
              </select>
            </div>

            <div class="pdv-row">
              <div class="pdv-field">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" step="0.01" readonly />
              </div>
              <div class="pdv-field">
                <label for="recebido">Valor Recebido (R$)</label>
                <input type="number" id="recebido" step="0.01" placeholder="100.00" />
              </div>
            </div>

            <div class="result" id="resultado"></div>

            <button class="btn btn-full" onclick="registrarPagamento()">
              <i class="fa-solid fa-check"></i> Registrar Pagamento
            </button>
          </div>

          <!-- Histórico de Pagamentos -->
          <div class="panel">
            <h3 class="panel-title"><i class="fa-solid fa-receipt"></i> Histórico</h3>
            <table class="table">
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Serviço</th>
                  <th>Pago</th>
                  <th>Status</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody id="historicoBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <footer>© 2026 Benessere — Todos os direitos reservados.</footer>
    </div>

    <script src="js/pdv.js"></script>
    <script>
      function toggleMenu(){ document.querySelector('.sidebar').classList.toggle('closed'); }
    </script>
  </body>
</html>
