<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Criar Conta | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <a href="login_cliente.html" class="back-link" aria-label="Voltar">
      <i class="fa-solid fa-arrow-left"></i>
    </a>

    <main class="auth-wrapper">
      <a href="index.html" class="auth-brand">
        <img src="img/logo_icon.png" alt="Benessere" class="auth-logo" />
        <span class="auth-brand-text">Benessere</span>
      </a>

      <div class="auth-card">
        <span class="eyebrow center">Criar Conta</span>
        <h1>Junte-se ao Benessere</h1>
        <p class="subtitle">Crie sua conta e agende seus momentos de cuidado.</p>

        <form onsubmit="cadastrarCliente(event)">
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input id="cadNome" type="text" placeholder="Nome completo" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input id="cadEmail" type="email" placeholder="Seu email" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-phone"></i>
            <input id="cadTelefone" type="tel" placeholder="Telefone (opcional)" />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input id="cadSenha" type="password" placeholder="Crie uma senha" required />
          </div>

          <button id="btnCadastrar" class="btn-primary btn-full" type="submit">Criar Conta</button>
          <p id="msgCliente" class="form-msg"></p>
        </form>

        <div class="divider"><span>ou</span></div>

        <p class="auth-link">
          Já possui conta?
          <a href="login_cliente.html">Fazer login</a>
        </p>
      </div>
    </main>

    <footer class="auth-footer">© 2026 Benessere — Todos os direitos reservados.</footer>

    <script src="js/cadastro.js"></script>
  </body>
</html>
