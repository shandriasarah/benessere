<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Agendar Horário | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/agendar.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
      <h2>Benessere</h2>
      <ul>
        <li><a href="cliente_home.html"><i class="fa-solid fa-house"></i><span>Início</span></a></li>
        <li><a href="agendar.html" class="active"><i class="fa-solid fa-calendar-plus"></i><span>Agendar Horário</span></a></li>
        <li><a href="meus_agendamentos.html"><i class="fa-solid fa-calendar-days"></i><span>Meus Agendamentos</span></a></li>
        <li><a href="perfil.html"><i class="fa-solid fa-user"></i><span>Perfil</span></a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></a></li>
      </ul>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="brand">
          <img src="img/logo_icon.png" alt="" class="brand-icon" />
          Benessere
        </div>
        <div class="user-section">
          <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
          <button class="icon-btn"><i class="fa-regular fa-envelope"></i></button>
          <div class="user-avatar"></div>
        </div>
      </div>

      <div class="content">
        <div class="page-head">
          <span class="eyebrow">Reserve seu Horário</span>
          <h1>Escolha o profissional da sua preferência</h1>
          <p class="lead">Encontre o especialista perfeito para realçar sua beleza e autoestima.</p>
        </div>

        <div id="profissionaisContainer"></div>
      </div>

      <footer>© 2026 Benessere — Todos os direitos reservados.</footer>
    </div>

    <!-- MODAL -->
    <div id="agendarModal" class="modal-overlay">
      <div class="modal modal-agendar">
        <button class="close-btn" onclick="closeAgendarModal()" aria-label="Fechar">&times;</button>

        <h3 id="modalProfTitle"></h3>

        <label>Escolha o serviço</label>
        <div id="servicosGrid" class="chips-grid"></div>

        <label>Escolha a data</label>
        <div id="monthYear" class="month-year"></div>
        <div class="weekdays-grid">
          <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>

        <label>Escolha o horário</label>
        <div id="horariosGrid" class="chips-grid"></div>

        <div class="modal-actions">
          <button class="btn-small" onclick="closeAgendarModal()">Cancelar</button>
          <button id="confirmBtn" class="btn" onclick="confirmarAgendamento()">Confirmar Agendamento</button>
        </div>
      </div>
    </div>

    <script src="js/agendar.js"></script>
    <script>
      function toggleMenu(){ document.querySelector('.sidebar').classList.toggle('closed'); }
    </script>
  </body>
</html>
