<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clientes | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/cliente.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
      <div class="sidebar-brand"><span class="brand-icon"></span><h2>Benessere</h2></div>
      <ul>
        <li><a href="admin_home.html"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a></li>
        <li><a href="agenda.html"><i class="fa-solid fa-calendar-days"></i><span>Agendamentos</span></a></li>
        <li><a href="cliente.html" class="active"><i class="fa-solid fa-users"></i><span>Clientes</span></a></li>
        <li><a href="pdv.html"><i class="fa-solid fa-cash-register"></i><span>PDV</span></a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></a></li>
      </ul>
    </aside>

    <div class="main">
      <div class="content">
        <div class="page-head">
          <div>
            <span class="eyebrow">Gerenciamento</span>
            <h1>Clientes</h1>
          </div>
          <div class="controls">
            <div class="search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input id="searchInput" placeholder="Pesquisar cliente..." />
            </div>
            <button class="btn" id="newClient"><i class="fa-solid fa-plus"></i> Novo Cliente</button>
          </div>
        </div>

        <section class="panel">
          <table class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="clientsBody"></tbody>
          </table>
          <div id="emptyMsg" class="empty" style="display:none">Nenhum cliente cadastrado</div>
        </section>
      </div>

      <footer>© 2026 Benessere — Todos os direitos reservados.</footer>
    </div>

    <!-- Modal Cliente -->
    <div class="modal-overlay" id="clientModal">
      <div class="modal">
        <h3>Cadastro de Cliente</h3>
        <label>Nome completo</label>
        <input type="text" id="clientName" placeholder="Digite o nome" />
        <label>Email</label>
        <input type="email" id="clientEmail" placeholder="exemplo@email.com" />
        <label>Telefone</label>
        <input type="text" id="clientPhone" placeholder="(11) 99999-9999" />
        <label>Data de Nascimento</label>
        <input type="date" id="clientDOB" />
        <label>Status</label>
        <select id="clientStatus">
          <option value="Ativo">Ativo</option>
          <option value="Inativo">Inativo</option>
        </select>
        <label>Endereço</label>
        <input type="text" id="clientAddress" placeholder="Rua, número, bairro" />
        <label>Gênero</label>
        <select id="clientGender">
          <option value="">Selecione</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Outro">Outro</option>
        </select>
        <label>CPF / RG</label>
        <input type="text" id="clientDocument" placeholder="000.000.000-00" />
        <label>Observações</label>
        <textarea id="clientNotes" placeholder="Anotações" rows="3"></textarea>
        <div class="modal-actions">
          <button class="btn-small" id="clientCancel">Cancelar</button>
          <button class="btn" id="clientSave">Salvar</button>
        </div>
      </div>
    </div>

    <!-- Modal Anamnese -->
    <div class="modal-overlay" id="anamneseModal">
      <div class="modal">
        <h3>Ficha de Anamnese</h3>
        <label>Histórico de saúde</label>
        <textarea id="anamnesisHistory" placeholder="Doenças, alergias, medicamentos" rows="3"></textarea>
        <label>Tratamentos em andamento</label>
        <textarea id="anamnesisTreatment" rows="2"></textarea>
        <label>Procedimentos anteriores</label>
        <textarea id="anamnesisPast" rows="2"></textarea>
        <label>Observações do profissional</label>
        <textarea id="anamnesisObservations" rows="2"></textarea>
        <label>Última visita</label>
        <input type="date" id="anamnesisLastVisit" />
        <label>Frequência de visitas</label>
        <input type="text" id="anamnesisFrequency" />
        <label>Objetivos do cliente</label>
        <input type="text" id="anamnesisGoals" />
        <div class="modal-actions">
          <button class="btn-small" id="anamnesisCancel">Cancelar</button>
          <button class="btn" id="anamnesisSave">Salvar</button>
        </div>
      </div>
    </div>

    <script src="js/cliente.js"></script>
    <script>
      function toggleMenu(){ document.querySelector('.sidebar').classList.toggle('closed'); }
    </script>
  </body>
</html>
