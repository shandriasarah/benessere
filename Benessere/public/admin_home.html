<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Painel Administrativo | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/admin_home.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
      <h2>Benessere</h2>
      <ul>
        <li><a href="admin_home.html" class="active"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a></li>
        <li><a href="agenda.html"><i class="fa-solid fa-calendar-days"></i><span>Agendamentos</span></a></li>
        <li><a href="cliente.html"><i class="fa-solid fa-users"></i><span>Clientes</span></a></li>
        <li><a href="pdv.html"><i class="fa-solid fa-cash-register"></i><span>PDV</span></a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></a></li>
      </ul>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="brand">
          <span class="brand-icon"></span>
          Benessere
        </div>
        <div class="user-section">
          <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
          <button class="icon-btn"><i class="fa-regular fa-envelope"></i></button>
          <div class="user-avatar"></div>
        </div>
      </div>

      <div class="content">
        <div class="page-head">
          <div>
            <span class="eyebrow">Visão Geral</span>
            <h1>Painel Administrativo</h1>
          </div>
          <div class="controls">
            <button class="btn-small ghost" id="btnRefresh"><i class="fa-solid fa-rotate"></i> Atualizar</button>
            <button class="btn" id="btnNewBooking"><i class="fa-solid fa-plus"></i> Novo Agendamento</button>
          </div>
        </div>

        <!-- Cards -->
        <div class="dashboard-grid" id="cardsWrap">
          <div class="metric-card">
            <div class="metric-icon"><i class="fa-solid fa-user-group"></i></div>
            <div>
              <span class="metric-label">Clientes ativos</span>
              <p class="metric-value" id="cardClients">—</p>
            </div>
          </div>
          <div class="metric-card">
            <div class="metric-icon"><i class="fa-solid fa-calendar-check"></i></div>
            <div>
              <span class="metric-label">Agendamentos Hoje</span>
              <p class="metric-value" id="cardToday">—</p>
            </div>
          </div>
          <div class="metric-card">
            <div class="metric-icon"><i class="fa-solid fa-coins"></i></div>
            <div>
              <span class="metric-label">Faturamento (Mês)</span>
              <p class="metric-value" id="cardRevenue">R$ —</p>
            </div>
          </div>
        </div>

        <!-- Chart + Recent -->
        <div class="mid">
          <div class="panel chart-panel">
            <h3>Faturamento Mensal</h3>
            <canvas id="revenueChart" style="max-height:300px"></canvas>
          </div>

          <div class="panel recent-panel">
            <h3>Atalhos</h3>
            <div class="shortcuts">
              <a href="cliente.html" class="shortcut-card">
                <i class="fa-solid fa-users"></i>
                <span>Ver clientes</span>
              </a>
              <a href="agenda.html" class="shortcut-card">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Ver agenda</span>
              </a>
              <a href="pdv.html" class="shortcut-card">
                <i class="fa-solid fa-cash-register"></i>
                <span>Abrir PDV</span>
              </a>
            </div>
          </div>
        </div>
      </div>

      <footer>© 2026 Benessere — Todos os direitos reservados.</footer>
    </div>

    <script src="js/admin_home.js"></script>
    <script>
      function toggleMenu(){ document.querySelector('.sidebar').classList.toggle('closed'); }
    </script>
  </body>
</html>
