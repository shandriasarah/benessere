<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Cliente | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <a href="index.html" class="back-link" aria-label="Voltar ao início">
      <i class="fa-solid fa-arrow-left"></i>
    </a>

    <main class="auth-wrapper">
      <a href="index.html" class="auth-brand">
        <img src="img/logo_icon.png" alt="Benessere" class="auth-logo" />
        <span class="auth-brand-text">Benessere</span>
      </a>

      <div class="auth-card">
        <span class="eyebrow center">Área do Cliente</span>
        <h1>Bem-vinda de volta</h1>
        <p class="subtitle">Conecte-se ao seu refúgio de beleza e bem-estar.</p>

        <form onsubmit="return loginCliente(event);">
          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Seu email" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginSenha" placeholder="Sua senha" required />
          </div>

          <button class="btn-primary btn-full" type="submit">Entrar</button>
          <p id="msgCliente" class="form-msg"></p>
        </form>

        <div class="divider"><span>ou</span></div>

        <p class="auth-link">
          Ainda não tem conta?
          <a href="cadastro.html">Criar conta</a>
        </p>
      </div>
    </main>

    <footer class="auth-footer">© 2026 Benessere — Todos os direitos reservados.</footer>

    <script src="js/login_cliente.js"></script>
  </body>
</html>
