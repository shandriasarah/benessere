<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Perfil | Benessere</title>
    <link rel="icon" type="image/png" href="img/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/perfil.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="toggle-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
      <h2>Benessere</h2>
      <ul>
        <li><a href="cliente_home.html"><i class="fa-solid fa-house"></i><span>Início</span></a></li>
        <li><a href="agendar.html"><i class="fa-solid fa-calendar-plus"></i><span>Agendar Horário</span></a></li>
        <li><a href="meus_agendamentos.html"><i class="fa-solid fa-calendar-days"></i><span>Meus Agendamentos</span></a></li>
        <li><a href="perfil.html" class="active"><i class="fa-solid fa-user"></i><span>Perfil</span></a></li>
        <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></a></li>
      </ul>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="brand">
          <span class="brand-icon"></span>
          Benessere
        </div>
        <div class="user-section">
          <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
          <button class="icon-btn"><i class="fa-regular fa-envelope"></i></button>
          <div class="user-avatar"></div>
        </div>
      </div>

      <div class="content">
        <div class="profile-card">
          <span class="eyebrow center">Minha Conta</span>
          <h1>Meu Perfil</h1>
          <p class="lead">Confira seus dados e mantenha tudo atualizado.</p>

          <div class="info-group">
            <label>Nome completo</label>
            <input type="text" id="profileName" disabled />
          </div>
          <div class="info-group">
            <label>Email</label>
            <input type="email" id="profileEmail" disabled />
          </div>
          <div class="info-group">
            <label>Telefone</label>
            <input type="text" id="profilePhone" disabled />
          </div>
          <div class="info-group">
            <label>Endereço (opcional)</label>
            <input type="text" id="profileAddress" disabled />
          </div>
          <div class="info-group">
            <label>Data de Nascimento (opcional)</label>
            <input type="date" id="profileBirth" disabled />
          </div>

          <div class="edit-save-btns">
            <button class="btn-small" id="editBtn">Editar</button>
            <button class="btn" id="saveBtn" style="display: none">Salvar Alterações</button>
          </div>
        </div>
      </div>

      <footer>© 2026 Benessere — Todos os direitos reservados.</footer>
    </div>

    <script src="js/perfil.js"></script>
    <script>
      function toggleMenu(){ document.querySelector('.sidebar').classList.toggle('closed'); }
    </script>
  </body>
</html>
